version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nexora-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nexora_systems
    ports:
      - "3306:3306"
    volumes:
      - ./db_data.txt:/docker-entrypoint-initdb.d/init.sql
    restart: always
